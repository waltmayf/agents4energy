# Auto-generated by scripts/setup-github-integration.ts
name: Agent @mention handler

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  invoke-agent:
    runs-on: ubuntu-latest
    if: |
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issues' && github.event.action == 'assigned') ||
        (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.body, '@agent')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@agent'))
      )
    steps:
      - name: Acknowledge trigger
        # Event context (comment id, repo) is untrusted — pass via env and quote,
        # never interpolate ${{ }} into the script body (script-injection hardening).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$COMMENT_ID" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -d '{"content":"eyes"}'
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm install --no-save tsx @octokit/rest @smithy/signature-v4 @aws-crypto/sha256-js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_AGENT_ROLE_ARN }}
          aws-region: us-east-1

      - name: Invoke agent and post reply
        env:
          INVOKE_AGENT_RUNTIME_ARN: ${{ vars.INVOKE_AGENT_RUNTIME_ARN }}
          APPSYNC_ENDPOINT: ${{ vars.APPSYNC_ENDPOINT }}
          APP_URL: ${{ vars.APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.event.repository.default_branch }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: npx tsx scripts/github-agent-invoke.ts
