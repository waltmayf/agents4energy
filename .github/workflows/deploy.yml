# Single-command deploy: everything is built by `scripts/build.sh`.
# That script runs one `ampx sandbox --once`, which synthesizes the whole
# stack — Cognito/AppSync/Lambda/DynamoDB plus the AgentCore harness, memory,
# and gateway (all owned in-stack by web/amplify/backend.ts) plus S3/CloudFront
# hosting — then builds the Next.js app and publishes it to S3 + CloudFront.
#
# There is no separate `agentcore deploy`, no `configure-agentcore-auth.js`,
# no `inject-agentcore-env.js`, and no `extract-deployment-info.js` step:
# backend.ts re-derives the harness JWT authorizer from its own Cognito pool
# and exports hosting ARNs via addOutput({ custom: {...} }). See
# docs/architecture.md and scripts/build.sh.
name: Deploy

on:
  push:
    branches: ['**']
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  NEXT_TELEMETRY_DISABLED: 1
  ACT: ''  # overridden to 'true' by act for local runs; used to skip OIDC steps

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC auth to AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install AWS CLI (act only)
        if: ${{ env.ACT }}
        run: |
          if ! command -v aws &>/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install
          fi

      - name: Configure AWS credentials
        if: ${{ !env.ACT }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write AWS credentials file (act only — ampx CLI needs ~/.aws)
        if: ${{ env.ACT }}
        run: |
          mkdir -p ~/.aws
          printf '[default]\naws_access_key_id=%s\naws_secret_access_key=%s\n' \
            "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" > ~/.aws/credentials
          [ -n "${AWS_SESSION_TOKEN:-}" ] && \
            printf 'aws_session_token=%s\n' "$AWS_SESSION_TOKEN" >> ~/.aws/credentials
          printf '[default]\nregion=%s\n' "${AWS_REGION:-us-east-1}" > ~/.aws/config

      - run: pnpm install --frozen-lockfile

      # Build + deploy everything in one script (ampx sandbox → Next.js → S3/CloudFront).
      # DEPLOY_BRANCH overrides build.sh's `git rev-parse` (the Actions checkout is
      # detached, so HEAD has no branch name). The GITHUB_* / JIRA_* vars are
      # deploy-time inputs read by web/amplify/backend.ts (webhook receiver +
      # post-comment Lambdas — see docs/webhook-stepfunction-integration.md and
      # docs/github-integration.md); all optional, unset ones just leave that path
      # disabled and never fail synth/deploy.
      - name: Build and deploy (scripts/build.sh)
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          GITHUB_APP_ID: ${{ vars.AGENT_GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY_SECRET_ARN: ${{ vars.AGENT_GITHUB_APP_PRIVATE_KEY_SECRET_ARN }}
          GITHUB_WEBHOOK_SECRET_ARN: ${{ vars.AGENT_GITHUB_WEBHOOK_SECRET_ARN }}
          JIRA_WEBHOOK_SECRET_ARN: ${{ vars.AGENT_JIRA_WEBHOOK_SECRET_ARN }}
          JIRA_API_TOKEN_SECRET_ARN: ${{ vars.AGENT_JIRA_API_TOKEN_SECRET_ARN }}
          JIRA_BASE_URL: ${{ vars.AGENT_JIRA_BASE_URL }}
          JIRA_API_EMAIL: ${{ vars.AGENT_JIRA_API_EMAIL }}
        run: ./scripts/build.sh
